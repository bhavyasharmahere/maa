<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Profile</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Scoped wrapper prevents CSS bleed into your main project -->
  <div class="dev-profile-wrapper" id="profileWrapper" data-theme="light">
    
    <!-- Animated Gradients -->
    <div class="dev-profile-bg-shape shape-1"></div>
    <div class="dev-profile-bg-shape shape-2"></div>

    <header class="dev-profile-header">
      <button class="dev-theme-toggle" id="themeToggleBtn" aria-label="Toggle Theme">
        🌙 Dark Mode
      </button>
    </header>

    <main class="dev-profile-card">
      <div class="dev-profile-image-container">
        <div class="dev-profile-image-ring">
          <img 
            src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=500&q=80" 
            alt="Developer Avatar" 
            class="dev-profile-avatar"
          />
        </div>
      </div>

      <div class="dev-profile-content">
        <h1 class="dev-profile-name">Alex Developer</h1>
        <h2 class="dev-profile-title">Frontend Engineer & UI Designer</h2>
        <p class="dev-profile-desc">
          I build polished, pixel-perfect, and highly animated web experiences. 
          Passionate about Vanilla JavaScript, clean architecture, and creating intuitive 
          user interfaces that bring ideas to life.
        </p>

        <div class="dev-profile-links">
          <a href="#" class="dev-profile-link" target="_blank" rel="noreferrer">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">

            </svg>
            GitHub
          </a>
          <a href="#" class="dev-profile-link" target="_blank" rel="noreferrer">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
              <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
            </svg>
            LinkedIn
          </a>
          <a href="#" class="dev-profile-link dev-profile-link-primary" target="_blank" rel="noreferrer">
            Portfolio
          </a>
        </div>
      </div>
    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
